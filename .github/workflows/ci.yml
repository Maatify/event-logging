name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Change Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      heavy: ${{ steps.detect.outputs.heavy }}
    steps:
      - name: Checkout repository
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Detect relevant package changes
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
            if [[ "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
              base_sha="$(git rev-list --max-parents=0 "$head_sha")"
            fi
          else
            echo "heavy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "$base_sha" "$head_sha")"
          CHANGED_FILES="$changed_files" python3 <<'PY'
          import os

          def under_with_suffix(path, directory, suffix):
              return path.startswith(f"{directory}/") and path.endswith(suffix)

          def is_relevant(path):
              return (
                  under_with_suffix(path, "src", ".php")
                  or under_with_suffix(path, "src", ".sql")
                  or under_with_suffix(path, "tests", ".php")
                  or under_with_suffix(path, "tests", ".sql")
                  or under_with_suffix(path, "examples", ".php")
                  or under_with_suffix(path, "schema", ".sql")
                  or path in {"composer.json", "phpstan.neon", "phpunit.xml.dist"}
                  or under_with_suffix(path, ".github/workflows", ".yml")
              )

          changed_files = os.environ["CHANGED_FILES"].splitlines()
          for path in changed_files:
              print(path)

          heavy = any(is_relevant(path) for path in changed_files)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output_file:
              output_file.write(f"heavy={str(heavy).lower()}\n")
          PY

  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install and verify actionlint
        shell: bash
        run: |
          set -euo pipefail
          version="1.7.12"
          archive="actionlint_${version}_linux_amd64.tar.gz"
          checksum="8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
          curl --fail --location --silent --show-error --output "$archive" "https://github.com/rhysd/actionlint/releases/download/v${version}/${archive}"
          printf '%s  %s\n' "$checksum" "$archive" | sha256sum --check --strict
          tar -xzf "$archive" actionlint
          ./actionlint -version

      - name: Lint GitHub Actions workflows
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' workflow_files < <(find .github/workflows -type f \( -name '*.yml' -o -name '*.yaml' \) -print0 | sort -z)
          ./actionlint "${workflow_files[@]}"

  quality:
    name: Quality (PHP 8.2)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.heavy == 'true'
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup PHP
        # shivammathur/setup-php 2.35.5
        uses: shivammathur/setup-php@bf6b4fbd49ca58e4608c9c89fba0b8d90bd2a39f
        with:
          php-version: '8.2'
          coverage: none

      - name: Validate dependencies
        shell: bash
        run: |
          set -euo pipefail
          composer validate --strict
          composer update --no-interaction --prefer-dist --no-progress
          composer check-platform-reqs

      - name: Validate PHP syntax
        shell: bash
        run: |
          set -euo pipefail
          paths=()
          for path in src tests examples; do
            if [[ -d "$path" ]]; then
              paths+=("$path")
            fi
          done
          for path in phpstan.neon phpunit.xml.dist; do
            if [[ -f "$path" && "$path" == *.php ]]; then
              paths+=("$path")
            fi
          done
          if [[ ${#paths[@]} -eq 0 ]]; then
            echo "No package-owned PHP paths found for syntax validation." >&2
            exit 1
          fi
          find "${paths[@]}" -type f -name '*.php' -print0 | xargs -0 -r -n 1 php -l

      - name: Analyse and audit
        shell: bash
        run: |
          set -euo pipefail
          composer analyse
          composer audit --no-interaction --abandoned=fail

  latest-dependency-tests:
    name: Latest Dependency Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.heavy == 'true'
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
    steps:
      - name: Checkout repository
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup PHP
        # shivammathur/setup-php 2.35.5
        uses: shivammathur/setup-php@bf6b4fbd49ca58e4608c9c89fba0b8d90bd2a39f
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Run latest dependency tests
        shell: bash
        run: |
          set -euo pipefail
          composer update --no-interaction --prefer-dist --no-progress
          composer check-platform-reqs
          composer test:unit
          composer test:regression

  integration-tests:
    name: Integration Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.heavy == 'true'
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.5']
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: event_logging_test
          MYSQL_USER: event_logging
          MYSQL_PASSWORD: event_logging
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      EVENT_LOGGING_TEST_MYSQL_DSN: mysql:host=127.0.0.1;port=3306;dbname=event_logging_test;charset=utf8mb4
      EVENT_LOGGING_TEST_MYSQL_USER: event_logging
      EVENT_LOGGING_TEST_MYSQL_PASSWORD: event_logging
    steps:
      - name: Checkout repository
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup PHP
        # shivammathur/setup-php 2.35.5
        uses: shivammathur/setup-php@bf6b4fbd49ca58e4608c9c89fba0b8d90bd2a39f
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: pdo_mysql

      - name: Install latest compatible dependencies
        shell: bash
        run: |
          set -euo pipefail
          composer update --no-interaction --prefer-dist --no-progress
          composer check-platform-reqs

      - name: Run integration suite
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.php }}" == "8.2" ]]; then
            composer test
            composer test:integration
          else
            composer test:integration
            composer test:integration
          fi

  lowest-dependencies:
    name: Lowest Dependencies (PHP 8.2)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.heavy == 'true'
    timeout-minutes: 30
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: event_logging_test
          MYSQL_USER: event_logging
          MYSQL_PASSWORD: event_logging
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      EVENT_LOGGING_TEST_MYSQL_DSN: mysql:host=127.0.0.1;port=3306;dbname=event_logging_test;charset=utf8mb4
      EVENT_LOGGING_TEST_MYSQL_USER: event_logging
      EVENT_LOGGING_TEST_MYSQL_PASSWORD: event_logging
    steps:
      - name: Checkout repository
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup PHP
        # shivammathur/setup-php 2.35.5
        uses: shivammathur/setup-php@bf6b4fbd49ca58e4608c9c89fba0b8d90bd2a39f
        with:
          php-version: '8.2'
          coverage: none
          extensions: pdo_mysql

      - name: Run lowest dependency checks
        shell: bash
        run: |
          set -euo pipefail
          composer update --prefer-lowest --prefer-stable --no-interaction --prefer-dist --no-progress
          composer check-platform-reqs
          composer analyse
          composer test

  gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs:
      - changes
      - workflow-lint
      - quality
      - latest-dependency-tests
      - integration-tests
      - lowest-dependencies
    if: always()
    timeout-minutes: 5
    steps:
      - name: Enforce CI results
        shell: bash
        env:
          NEEDS_CONTEXT: ${{ toJson(needs) }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_CONTEXT"])
          heavy = needs["changes"].get("outputs", {}).get("heavy") == "true"
          failures = []

          for job in ("changes", "workflow-lint"):
              if needs[job]["result"] != "success":
                  failures.append(f"{job} result was {needs[job]['result']}, expected success")

          heavy_jobs = ("quality", "latest-dependency-tests", "integration-tests", "lowest-dependencies")
          for job in heavy_jobs:
              result = needs[job]["result"]
              expected = "success" if heavy else "skipped"
              if result != expected:
                  failures.append(f"{job} result was {result}, expected {expected}")

          if failures:
              for failure in failures:
                  print(f"::error::{failure}")
              sys.exit(1)

          print("CI Gate passed")
          PY
