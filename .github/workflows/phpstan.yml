name: PHPStan

on:
  push:
    paths:
      - "src/**/*.php"
      - "tests/**/*.php"
      - "examples/**/*.php"
      - "composer.json"
      - "composer.lock"
      - "phpstan.neon"
      - ".github/workflows/phpstan.yml"
  pull_request:
    paths:
      - "src/**/*.php"
      - "tests/**/*.php"
      - "examples/**/*.php"
      - "composer.json"
      - "composer.lock"
      - "phpstan.neon"
      - ".github/workflows/phpstan.yml"

jobs:
  phpstan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Validate composer
        run: composer validate

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: PHP syntax check
        run: find src tests examples -name "*.php" -exec php -l {} \;

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse -c phpstan.neon
