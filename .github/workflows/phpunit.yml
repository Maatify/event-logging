name: PHPUnit

on:
  push:
    paths:
      - "src/**/*.php"
      - "tests/**/*.php"
      - "composer.json"
      - "composer.lock"
      - "phpunit.xml.dist"
      - ".github/workflows/phpunit.yml"
  pull_request:
    paths:
      - "src/**/*.php"
      - "tests/**/*.php"
      - "composer.json"
      - "composer.lock"
      - "phpunit.xml.dist"
      - ".github/workflows/phpunit.yml"

jobs:
  phpunit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHPUnit
        run: vendor/bin/phpunit
