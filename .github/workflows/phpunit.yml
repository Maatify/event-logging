name: PHPUnit

on:
  push:
    paths:
      - "src/**/*.php"
      - "src/**/*.sql"
      - "tests/**/*.php"
      - "examples/**/*.php"
      - "composer.json"
      - "composer.lock"
      - "phpunit.xml.dist"
      - ".github/workflows/phpunit.yml"
  pull_request:
    paths:
      - "src/**/*.php"
      - "src/**/*.sql"
      - "tests/**/*.php"
      - "examples/**/*.php"
      - "composer.json"
      - "composer.lock"
      - "phpunit.xml.dist"
      - ".github/workflows/phpunit.yml"

jobs:
  phpunit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Syntax check examples
        run: find examples -name "*.php" -exec php -l {} \;

      - name: Run Unit Tests
        run: vendor/bin/phpunit --testsuite Unit

      - name: Run Regression Tests
        run: vendor/bin/phpunit --testsuite Regression

  phpunit-integration:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: event_logging_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          extensions: pdo_mysql

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run Integration Tests
        env:
          EVENT_LOGGING_TEST_MYSQL_DSN: "mysql:host=127.0.0.1;port=3306;dbname=event_logging_test"
          EVENT_LOGGING_TEST_MYSQL_USER: "root"
          EVENT_LOGGING_TEST_MYSQL_PASSWORD: "root"
        run: vendor/bin/phpunit --testsuite Integration
